<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accents en Català</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 900px;
      width: 100%;
      padding: 40px;
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .stats {
      display: flex;
      justify-content: space-around;
      margin-bottom: 30px;
      background: #f5f5f5;
      padding: 15px;
      border-radius: 10px;
    }

    .stat-item {
      text-align: center;
    }

    .stat-number {
      font-size: 24px;
      font-weight: bold;
      color: #667eea;
    }

    .stat-label {
      font-size: 12px;
      color: #999;
      margin-top: 5px;
    }

    .word-container {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      margin-bottom: 30px;
    }

    .category-info {
      font-size: 13px;
      color: rgba(255,255,255,0.9);
      margin-bottom: 15px;
    }

    .word-display {
      font-size: 48px;
      font-weight: bold;
      letter-spacing: 2px;
      margin-bottom: 20px;
      font-family: 'Courier New', monospace;
    }

    .vowel-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .vowel-btn {
      background: rgba(255,255,255,0.2);
      color: white;
      border: 2px solid rgba(255,255,255,0.5);
      padding: 12px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 28px;
      font-weight: bold;
      transition: all 0.3s ease;
      position: relative;
      min-width: 55px;
      line-height: 1;
    }

    .vowel-btn:hover {
      background: rgba(255,255,255,0.3);
      border-color: white;
      transform: translateY(-2px);
    }

    .vowel-btn.active {
      background: white;
      color: #667eea;
      border-color: white;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: #e0e0e0;
      border-radius: 10px;
      margin-bottom: 30px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      transition: width 0.3s ease;
    }

    .action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-submit {
      background: #667eea;
      color: white;
      grid-column: 1 / -1;
    }

    .btn-submit:hover {
      background: #764ba2;
      transform: translateY(-2px);
    }

    .btn-submit:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }

    .btn-next {
      background: #28a745;
      color: white;
      display: none;
    }

    .btn-next:hover {
      background: #218838;
    }

    .btn-clear {
      background: #dc3545;
      color: white;
    }

    .btn-clear:hover {
      background: #c82333;
    }

    .result {
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
      text-align: center;
      font-weight: bold;
      display: none;
    }

    .result.show {
      display: block;
    }

    .result.correct {
      background: #d4edda;
      color: #155724;
      border: 2px solid #28a745;
    }

    .result.incorrect {
      background: #f8d7da;
      color: #721c24;
      border: 2px solid #f5c6cb;
    }

    .instructions {
      background: #e7f3ff;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #0c5460;
      border-left: 4px solid #0c5460;
    }

    .finish-message {
      text-align: center;
      padding: 30px;
      background: #f0f0f0;
      border-radius: 10px;
      display: none;
    }

    .finish-message.show {
      display: block;
    }

    .finish-message h2 {
      color: #667eea;
      margin-bottom: 15px;
    }

    .finish-score {
      font-size: 36px;
      font-weight: bold;
      color: #28a745;
      margin: 20px 0;
    }

    .btn-restart {
      background: #667eea;
      color: white;
      padding: 12px 30px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 20px;
      transition: all 0.3s ease;
    }

    .btn-restart:hover {
      background: #764ba2;
    }

    .vowel-menu {
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: #667eea;
      color: white;
      padding: 10px;
      border-radius: 6px;
      display: flex;
      gap: 8px;
      z-index: 1000;
      margin-top: 8px;
      flex-wrap: wrap;
      max-width: 120px;
      justify-content: center;
    }

    .vowel-menu button {
      background: rgba(255,255,255,0.3);
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      font-size: 18px;
    }

    .vowel-menu button:hover {
      background: rgba(255,255,255,0.5);
    }

    @media (max-width: 600px) {
      .word-display {
        font-size: 32px;
      }

      .vowel-btn {
        padding: 10px 14px;
        font-size: 22px;
        min-width: 48px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎯 Accents en Català</h1>
    <p class="subtitle">Fes clic a les vocals per afegir accents o dièresis</p>

    <div class="instructions">
      <strong>Com jugar:</strong> Fes clic a les vocals de la paraula per afegir accents (oberts o tancats) o dièresis. Després prem "Comprovar".
    </div>

    <div class="stats">
      <div class="stat-item">
        <div class="stat-number" id="correct">0</div>
        <div class="stat-label">Correctes</div>
      </div>
      <div class="stat-item">
        <div class="stat-number" id="incorrect">0</div>
        <div class="stat-label">Incorrectes</div>
      </div>
      <div class="stat-item">
        <div class="stat-number" id="remaining">70</div>
        <div class="stat-label">Restants</div>
      </div>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progress" style="width: 0%"></div>
    </div>

    <div class="word-container">
      <div class="category-info" id="categoryInfo">Paraula 1 de 70</div>
      <div class="word-display" id="wordDisplay">—</div>
      <div class="vowel-buttons" id="vowelButtons"></div>
    </div>

    <div class="action-buttons">
      <button class="btn btn-clear" id="clearBtn">Netejar</button>
      <button class="btn btn-submit" id="submitBtn">Comprovar</button>
      <button class="btn btn-next" id="nextBtn">Següent</button>
      <button class="btn btn-submit" id="finishSendBtn" style="background:#0ea5e9;">✓ Acabar i enviar</button>
    </div>

    <div class="result" id="result"></div>

    <div class="finish-message" id="finishMessage">
      <h2>🎉 Felicitats!</h2>
      <p>Has completat l'activitat</p>
      <div class="finish-score" id="finishScore"></div>
      <button class="btn-restart" id="restartBtn">Reiniciar</button>
    </div>
  </div>

  <script>
    const palabrasSenseAccent = {
      planes: ['basquet', 'public', 'tipic', 'plastic', 'arab', 'anim', 'comic', 'correr', 'creixer', 'textil', 'reptil', 'missil', 'cataleg', 'platan', 'diposit', 'interfon', 'solid'],
      agudas: ['cano', 'camio', 'rao', 'accio', 'interes', 'acces', 'cafe', 'tambe', 'perque', 'pero', 'angles', 'frances', 'avio', 'opinio', 'coixi', 'jardi', 'cami'],
      esdruxolas: ['numero', 'publica', 'quimica', 'fisica', 'tipica', 'classica', 'fantastica', 'magica', 'logica', 'practica', 'gramatica', 'informatica', 'sistematica', 'automatica', 'democratic', 'aritmetica', 'simetric', 'asimetric'],
      dieresis: ['aigues', 'pingui', 'linguistica', 'linguistic', 'questio', 'frequent', 'sequencia', 'consequencia', 'eloquent', 'delinquent', 'bilingue', 'trilingue', 'llengues', 'unguent', 'arguir', 'ambiguitat', 'raim', 'ensaimada', 'veina', 'traidor']
    };

    const correctAnswers = {
      planes: ['bàsquet', 'públic', 'típic', 'plàstic', 'àrab', 'ànim', 'còmic', 'córrer', 'créixer', 'tèxtil', 'rèptil', 'míssil', 'catàleg', 'plàtan', 'dipòsit', 'intèrfon', 'sòlid'],
      agudas: ['canó', 'camió', 'raó', 'acció', 'interès', 'accés', 'cafè', 'també', 'perquè', 'però', 'anglès', 'francès', 'avió', 'opinió', 'coixí', 'jardí', 'camí'],
      esdruxolas: ['número', 'pública', 'química', 'física', 'típica', 'clàssica', 'fantàstica', 'màgica', 'lògica', 'pràctica', 'gramàtica', 'informàtica', 'sistemàtica', 'automàtica', 'democràtic', 'aritmètica', 'simètric', 'asimètric'],
      dieresis: ['aigües', 'pingüí', 'lingüística', 'lingüístic', 'qüestió', 'freqüent', 'seqüència', 'conseqüència', 'eloqüent', 'delinqüent', 'bilingüe', 'trilingüe', 'llengües', 'ungüent', 'argüir', 'ambigüitat', 'raïm', 'ensaïmada', 'veïna', 'traïdor']
    };

    const vowels = ['a', 'e', 'i', 'o', 'u'];
    const accentsOberts = { 'a': 'à', 'e': 'è', 'o': 'ò' };
    const accentsTancats = { 'e': 'é', 'i': 'í', 'o': 'ó', 'u': 'ú' };
    const dieresis = { 'u': 'ü', 'i': 'ï' };

    let palabrasBarajadas = [];
    let indiceActual = 0;
    let palabraActual = null;
    let correctWord = null;
    let userWord = '';
    let aciertos = 0;
    let errores = 0;
let currentCategory = null;
let startTimestamp = null;
let attemptLog = [];
let sentResult = false;


    function inicializarJuego() {
 startTimestamp = Date.now();
 attemptLog = [];
 sentResult = false;
      palabrasBarajadas = [];
      for (const category in palabrasSenseAccent) {
        palabrasSenseAccent[category].forEach((palabra, idx) => {
          palabrasBarajadas.push({ 
            palabra, 
            category,
            correct: correctAnswers[category][idx]
          });
        });
      }
      palabrasBarajadas.sort(() => Math.random() - 0.5);
      mostrarPalabra();
    }

    function mostrarPalabra() {
      if (indiceActual >= palabrasBarajadas.length) {
        finalizarJuego();
        return;
      }

      const item = palabrasBarajadas[indiceActual];
 currentCategory = item.category;
      palabraActual = item.palabra;
      correctWord = item.correct;
      userWord = item.palabra;

      document.getElementById('categoryInfo').textContent = `Paraula ${indiceActual + 1} de ${palabrasBarajadas.length}`;
      document.getElementById('wordDisplay').textContent = userWord;
      
      crearBotonesVocales();
      document.getElementById('result').classList.remove('show');
      document.getElementById('nextBtn').style.display = 'none';
      document.getElementById('submitBtn').style.display = 'block';

      actualizarProgreso();
    }

    function crearBotonesVocales() {
      const container = document.getElementById('vowelButtons');
      container.innerHTML = '';

      for (let i = 0; i < userWord.length; i++) {
        const char = userWord[i];
        
        if (vowels.includes(char)) {
          const btn = document.createElement('button');
          btn.className = 'vowel-btn';
          btn.textContent = char.toUpperCase();
          btn.dataset.index = i;
          btn.dataset.char = char;
          
          btn.addEventListener('click', () => {
            mostrarOpcionesVocal(i, char, btn);
          });
          
          container.appendChild(btn);
        }
      }
    }

    function mostrarOpcionesVocal(index, char, btn) {
      let menu = btn.querySelector('.vowel-menu');
      if (menu) {
        menu.remove();
        btn.classList.remove('active');
        return;
      }

      const opciones = [char];
      if (accentsOberts[char]) opciones.push(accentsOberts[char]);
      if (accentsTancats[char]) opciones.push(accentsTancats[char]);
      if (dieresis[char]) opciones.push(dieresis[char]);

      btn.classList.add('active');

      menu = document.createElement('div');
      menu.className = 'vowel-menu';

      opciones.forEach(opcion => {
        const opBtn = document.createElement('button');
        opBtn.textContent = opcion.toUpperCase();
        opBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          modificarLetra(index, opcion);
          menu.remove();
          btn.classList.remove('active');
          crearBotonesVocales();
        });
        menu.appendChild(opBtn);
      });

      btn.appendChild(menu);
    }

    function modificarLetra(index, nuevoChar) {
      const wordArray = userWord.split('');
      wordArray[index] = nuevoChar;
      userWord = wordArray.join('');
      document.getElementById('wordDisplay').textContent = userWord;
    }

    function actualizarProgreso() {
      const progreso = (indiceActual / palabrasBarajadas.length) * 100;
      document.getElementById('progress').style.width = progreso + '%';
      document.getElementById('remaining').textContent = palabrasBarajadas.length - indiceActual;
    }

    document.getElementById('submitBtn').addEventListener('click', function() {
      const esCorrect = userWord === correctWord;

// 🔎 Log de l'intent per al portal
attemptLog.push({
  numero: indiceActual + 1,
  paraulaBase: palabraActual,
  respostaUsuari: userWord,
  respostaCorrecta: correctWord,
  categoria: currentCategory,
  correcta: esCorrect
});

      if (esCorrect) {
        aciertos++;
        document.getElementById('result').textContent = '✓ Correcte!';
        document.getElementById('result').classList.remove('incorrect');
        document.getElementById('result').classList.add('correct');
      } else {
        errores++;
        document.getElementById('result').textContent = `✗ Incorrecte. Correcta: ${correctWord}`;
        document.getElementById('result').classList.remove('correct');
        document.getElementById('result').classList.add('incorrect');
      }

      document.getElementById('result').classList.add('show');
      document.getElementById('correct').textContent = aciertos;
      document.getElementById('incorrect').textContent = errores;
      document.getElementById('submitBtn').style.display = 'none';
      document.getElementById('nextBtn').style.display = 'block';
    });

    document.getElementById('nextBtn').addEventListener('click', function() {
      indiceActual++;
      mostrarPalabra();
    });
document.getElementById('finishSendBtn').addEventListener('click', function() {
  // Permet enviar resultat sense haver de completar totes les paraules
  sendResultToPortal();
  // Feedback visual
  const r = document.getElementById('result');
  r.textContent = '✅ Resultat enviat al portal. Pots sortir.';
  r.classList.remove('incorrect');
  r.classList.add('correct');
  r.classList.add('show');
  // Desactiva botons principals per evitar re-enviaments accidentals
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('nextBtn').disabled = true;
  document.getElementById('clearBtn').disabled = true;
  this.disabled = true;
});

    document.getElementById('clearBtn').addEventListener('click', function() {
      mostrarPalabra();
    });

    document.getElementById('restartBtn').addEventListener('click', function() {
      aciertos = 0;
      errores = 0;
      indiceActual = 0;
      document.getElementById('finishMessage').classList.remove('show');
      document.getElementById('correct').textContent = 0;
      document.getElementById('incorrect').textContent = 0;
      inicializarJuego();
    });

    

function sendResultToPortal() {
  if (sentResult) return;
  const total = aciertos + errores;
  if (total <= 0) return;

  const tempsSegons = startTimestamp ? Math.round((Date.now() - startTimestamp) / 1000) : null;

  const errors = attemptLog
    .filter(x => !x.correcta)
    .map(x => ({
      pregunta: x.numero,
      paraulaBase: x.paraulaBase,
      respostaUsuari: x.respostaUsuari,
      respostaCorrecta: x.respostaCorrecta,
      categoria: x.categoria
    }));

  window.parent.postMessage({
    type: 'ACT_RESULT',
    activityId: 'A8',
    payload: {
      total,
      encerts: aciertos,
      errades: errores,
      tempsSegons,
      mode: 'barrejat',
      errors
    }
  }, '*');

  sentResult = true;
}
function finalizarJuego() {
      const porcentaje = ((aciertos / palabrasBarajadas.length) * 100).toFixed(1);
      document.getElementById('finishScore').textContent = `${aciertos}/${palabrasBarajadas.length} (${porcentaje}%)`;
      document.getElementById('finishMessage').classList.add('show');
      document.getElementById('submitBtn').style.display = 'none';
    }

    inicializarJuego();
  </script>
</script>
</body>
</html>
