<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S Sonora i S Sorda — Moderna (Banc complet)</title>

<style>
    body {
        margin: 0;
        font-family: "Fredoka", sans-serif;
        background: linear-gradient(145deg, #fef3c7 0%, #fde68a 50%, #fcd34d 100%);
        text-align: center;
    }
    .screen { padding: 40px 20px; }
    .hidden { display: none; }

    h1 {
        font-size: 3rem;
        margin-bottom: 10px;
        color: #7c3aed;
    }
    .subtitle { font-size: 1.2rem; margin-bottom: 35px; color: #8b5cf6; }

    .btn-big, .btn {
        padding: 16px 26px;
        border: none;
        background: linear-gradient(135deg, #7c3aed, #6d28d9);
        color: white;
        font-size: 1.3rem;
        border-radius: 16px;
        cursor: pointer;
        margin-top: 20px;
        transition: transform 0.2s;
    }
    .btn-big:hover, .btn:hover { transform: scale(1.05); }

    .glass {
        background: rgba(255, 255, 255, 0.95);
        padding: 30px;
        border-radius: 24px;
        max-width: 650px;
        margin: auto;
        box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        backdrop-filter: blur(10px);
    }

    #question-text {
        font-size: 1.9rem;
        font-weight: bold;
        color: #333;
        margin-bottom: 25px;
    }

    .options {
        display: grid;
        gap: 18px;
        margin-top: 30px;
    }

    .option-btn {
        padding: 22px;
        background: white;
        border: 4px solid #a78bfa;
        border-radius: 18px;
        font-size: 1.7rem;
        cursor: pointer;
        transition: all 0.2s;
    }
    .option-btn:hover {
        transform: scale(1.04);
        background: #faf5ff;
    }

    .correct { background: #10b981 !important; color: white !important; }
    .incorrect { background: #ef4444 !important; color: white !important; }

    #fb-icon {
        font-size: 5rem;
        margin-bottom: 10px;
    }
    .rule {
        font-size: 1.2rem;
        max-width: 500px;
        margin: 20px auto;
        color: #444;
    }

    .final-score {
        font-size: 3rem;
        font-weight: bold;
        color: #333;
        margin-top: 20px;
    }
</style>
</head>

<body>

<!-- PANTALLA INICIAL -->
<section id="welcome" class="screen">
    <h1>S Sonora i S Sorda</h1>
    <p class="subtitle">Aprèn a diferenciar els sons de la S</p>
    <button class="btn-big" onclick="startQuiz()">Començar →</button>
</section>

<!-- PANTALLA QUIZ -->
<section id="quiz" class="screen hidden">
    <div class="glass">
        <p id="counter"></p>

        <p id="question-text"></p>

        <div id="options" class="options"></div>
    </div>
</section>

<!-- FEEDBACK -->
<section id="feedback" class="screen hidden">
    <div class="glass">
        <div id="fb-icon"></div>
        <h2 id="fb-text"></h2>
        <p id="fb-rule" class="rule"></p>

        <button class="btn" onclick="nextQuestion()">Següent →</button>
    </div>
</section>

<!-- PANTALLA FINAL -->
<section id="final" class="screen hidden">
    <div class="glass">
        <h1>Resultat final</h1>
        <p class="final-score"><span id="correct"></span>/<span id="total"></span> encerts</p>
        <button class="btn-big" onclick="location.reload()">Tornar a jugar</button>
    </div>
</section>

<script>
/* === BANCS COMPLETS DE PARAULES (72 PARAULES TOTALS) === */

const WORDS = {
  sonora: [
    'casa','rosa','música','camisa','ase','bellesa','desembre','ozó','amazona',
    'trapezi','nazisme','zebra','zero','zinc','zona','onze','dotze','pinzell',
    'esmorzar','crisi','dosi','benzina','medusa','paisatge','endinsar','transitar',
    'enfonsar','trànsit'
  ],
  sorda: [
    'sabata','sabó','senyor','silenci','arròs','nas','gos','llapis','temps',
    'persones','arbres','bastó','fusta','gespa','trist','cursa','dansa','passar',
    'cassola','tossut','arrossos','cel','ceba','cent','cim','cinema','cigró','ciutat',
    'importància','distància','ambulància','ciència','força','plaça','cançó','eriçó',
    'lliçó','confiança','esperança','aparença','creença','braç','llaç','lluç','glaç'
  ]
};

const RULES = {
  'casa': 'S entre vocals → S SONORA (ca-s-a)',
  'rosa': 'S entre vocals → S SONORA (ro-s-a)',
  'música': 'S entre vocals → S SONORA (mú-si-ca)',
  'camisa': 'S entre vocals → S SONORA (ca-mi-sa)',
  'ase': 'S entre vocals → S SONORA (a-se)',
  'bellesa': 'S entre vocals → S SONORA (be-lle-sa)',
  'desembre': 'S entre vocals → S SONORA (de-sem-bre)',
  'ozó': 'Z sona com S SONORA',
  'amazona': 'Z sona com S SONORA',
  'trapezi': 'Z sona com S SONORA',
  'nazisme': 'Z sona com S SONORA',
  'zebra': 'Z sona com S SONORA',
  'zero': 'Z sona com S SONORA',
  'zinc': 'Z sona com S SONORA',
  'zona': 'Z sona com S SONORA',
  'onze': 'Z sona com S SONORA',
  'dotze': 'Z sona com S SONORA',
  'pinzell': 'Z sona com S SONORA',
  'esmorzar': 'Z sona com S SONORA',
  'crisi': 'S entre vocals → S SONORA',
  'dosi': 'S entre vocals → S SONORA',
  'benzina': 'Z sona com S SONORA',
  'medusa': 'S entre vocals → S SONORA',
  'paisatge': 'S entre vocals → S SONORA',
  'endinsar': 'Derivat de dins → S SONORA [z]',
  'transitar': 'Derivat de trans → S SONORA [z]',
  'enfonsar': 'Derivat de fons → S SONORA [z]',
  'trànsit': 'Derivat de trans → S SONORA [z]',

  'sabata': 'S inicial → S SORDA',
  'sabó': 'S inicial → S SORDA',
  'senyor': 'S inicial → S SORDA',
  'silenci': 'S inicial → S SORDA',
  'arròs': 'S després de consonant → S SORDA',
  'nas': 'S final → S SORDA',
  'gos': 'S final → S SORDA',
  'llapis': 'S final → S SORDA',
  'temps': 'S després de consonant → S SORDA',
  'persones': 'S inicial de síl·laba → S SORDA',
  'arbres': 'S després de consonant → S SORDA',
  'bastó': 'S inicial de síl·laba → S SORDA',
  'fusta': 'S inicial de síl·laba → S SORDA',
  'gespa': 'S inicial de síl·laba → S SORDA',
  'trist': 'S final → S SORDA',
  'cursa': 'S inicial de síl·laba → S SORDA',
  'dansa': 'S després de consonant → S SORDA',
  'passar': 'SS sempre és SORDA',
  'cassola': 'SS sempre és SORDA',
  'tossut': 'SS sempre és SORDA',
  'arrossos': 'SS sempre és SORDA',
  'cel': 'C davant e/i → S SORDA',
  'ceba': 'C davant e/i → S SORDA',
  'cent': 'C davant e/i → S SORDA',
  'cim': 'C davant e/i → S SORDA',
  'cinema': 'C davant e/i → S SORDA',
  'cigró': 'C davant e/i → S SORDA',
  'ciutat': 'C davant e/i → S SORDA',
  'importància': 'C davant e/i → S SORDA',
  'distància': 'C davant e/i → S SORDA',
  'ambulància': 'C davant e/i → S SORDA',
  'ciència': 'C davant e/i → S SORDA',
  'força': 'Ç sempre sona com S SORDA',
  'plaça': 'Ç sempre sona com S SORDA',
  'cançó': 'Ç sempre sona com S SORDA',
  'eriçó': 'Ç sempre sona com S SORDA',
  'lliçó': 'Ç sempre sona com S SORDA',
  'confiança': 'Ç sempre sona com S SORDA',
  'esperança': 'Ç sempre sona com S SORDA',
  'aparença': 'Ç sempre sona com S SORDA',
  'creença': 'Ç sempre sona com S SORDA',
  'braç': 'Ç sempre sona com S SORDA',
  'llaç': 'Ç sempre sona com S SORDA',
  'lluç': 'Ç sempre sona com S SORDA',
  'glaç': 'Ç sempre sona com S SORDA'
};

/* ================================ */

let TOTAL_QUESTIONS = 15; // ▶️ Pots posar 10, 15, 20, 30…
let index = 0;
let score = 0;

let generated = [];  // Llista de preguntes generades aleatòriament
let startTime = null;
let answers = [];


function startQuiz() {
  startTime = Date.now();
  answers = [];
  generateQuestions();

    document.getElementById("welcome").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    loadQuestion();
}

function generateQuestions() {
    generated = [];

    for (let i = 0; i < TOTAL_QUESTIONS; i++) {
        const askSonora = Math.random() < 0.5;
        const tipus = askSonora ? 'sonora' : 'sorda';
        const contrari = askSonora ? 'sorda' : 'sonora';

        const correct = randomFrom(WORDS[tipus]);
        let wrong1 = randomFrom(WORDS[contrari]);
        let wrong2 = randomFrom(WORDS[contrari]);

        // Evitar duplicats dins la mateixa pregunta
        while (wrong1 === wrong2) wrong2 = randomFrom(WORDS[contrari]);

        generated.push({
            ask: tipus,
            correct: correct,
            wrong: [wrong1, wrong2],
            rule: RULES[correct]
        });
    }
}

function loadQuestion() {
    const q = generated[index];

    document.getElementById("counter").textContent =
        `Pregunta ${index + 1} de ${TOTAL_QUESTIONS}`;

    const tipus = q.ask === "sonora" ? "S SONORA" : "S SORDA";

    document.getElementById("question-text").innerHTML =
        `Quina d'aquestes paraules conté una <strong>${tipus}</strong>?`;

    const opts = shuffle([q.correct, ...q.wrong]);
    const container = document.getElementById("options");
    container.innerHTML = "";

    opts.forEach(word => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.textContent = word;

        btn.onclick = () => select(word, q);

        container.appendChild(btn);
    });
}

function select(word, q) {
  const correct = word === q.correct;
  answers.push({
    pregunta: index + 1,
    respostaUsuari: word,
    respostaCorrecta: q.correct,
    correcta: correct,
    tipus: q.ask
  });

    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("feedback").classList.remove("hidden");

    document.getElementById("fb-icon").textContent = correct ? "✅" : "❌";
    document.getElementById("fb-text").textContent = correct ? "Correcte!" : "Incorrecte!";
    document.getElementById("fb-rule").textContent = q.rule;

    if (correct) score++;
}

function nextQuestion() {
    index++;

    if (index >= TOTAL_QUESTIONS) {
        showFinal();
        return;
    }

    document.getElementById("feedback").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    loadQuestion();
}

function showFinal() {
  document.getElementById("feedback").classList.add("hidden");
  document.getElementById("final").classList.remove("hidden");
  document.getElementById("correct").textContent = score;
  document.getElementById("total").textContent = TOTAL_QUESTIONS;

  // ✅ Envia el resultat al portal (pàgina pare) perquè el desi a Firebase
  const total = TOTAL_QUESTIONS;
  const encerts = score;
  const errades = total - encerts;
  const tempsSegons = startTime ? Math.round((Date.now() - startTime) / 1000) : null;

  const errors = answers
    .filter(a => !a.correcta)
    .map(a => ({
      pregunta: a.pregunta,
      respostaUsuari: a.respostaUsuari,
      respostaCorrecta: a.respostaCorrecta,
      tipus: a.tipus
    }));

  window.parent.postMessage({
    type: "A3_RESULT",
    payload: { total, encerts, errades, tempsSegons, errors }
  }, "*");
}

function randomFrom(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
}

function shuffle(arr) {
    return arr.sort(() => Math.random() - 0.5);
}
</script>

</body>
</html>
